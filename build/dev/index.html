<!DOCTYPE html>

<html lang="en">

    <head>

        <!-- Required meta tags -->
        <meta charset="UTF-8"/>
        <meta name="viewport"
              content="minimum-scale=1, initial-scale=1, width=device-width, shrink-to-fit=no"/>

        <!-- Basic info -->
        <meta name="author" content="Kris Torres"/>
        <meta name="description" content="Kris Torres’s website."/>
        <meta name="keywords"
              content="Kris Torres, computer programming, computer programmer, developer, website, portfolio"/>

        <!-- Twitter Cards -->
        <meta name="twitter:card" content="summary"/>
        <meta name="twitter:creator" content="@ohayoukris"/>
        <meta name="twitter:title" content="Kris Torres’s Website"/>
        <meta name="twitter:image"
              content="https://kristorres.github.io/images/banners/kt-banner-main.png"/>
        <meta name="twitter:description"
              content="Hello, world! I’m an app developer and I love to build cool things! 👨🏻‍💻🗼😄"/>

        <!-- Open Graph protocol -->
        <meta property="og:title" content="Kris Torres’s Website"/>
        <meta property="og:type" content="website"/>
        <meta property="og:url" content="https://kristorres.github.io"/>
        <meta property="og:image"
              content="https://kristorres.github.io/images/banners/kt-banner-main.png"/>
        <meta property="og:description" content="Kris Torres’s website."/>

        <!-- Google Chrome for Android toolbar color -->
        <meta name="theme-color" content="#1A64D7"/>

        <!-- Web page title -->
        <title>Kris Torres’s Website</title>

        <!-- Rubik and Oswald fonts CSS -->
        <link rel="stylesheet"
              type="text/css"
              href="https://fonts.googleapis.com/css?family=Rubik:400,700|Oswald:700"/>

        <!-- Material Design Icons CSS -->
        <link rel="stylesheet"
              type="text/css"
              href="https://fonts.googleapis.com/icon?family=Material+Icons"/>

        <!-- Global styles -->
        <link rel="stylesheet" type="text/css" href="global.css"/>

        <!-- Favicon -->
        <link rel="shortcut icon" type="image/x-icon" href="favicon.ico"/>

        <!-- iOS icon -->
        <link rel="apple-touch-icon"
              type="image/png"
              href="images/logos/KT_PRI_LOGO_ON_BLU.png"/>

        <!-- Typed.js JavaScript -->
        <script crossorigin
                src="https://cdn.jsdelivr.net/npm/typed.js@2">
        </script>

    </head>

    <body>
        <script src="main.js"></script>
    </body>

</html>
